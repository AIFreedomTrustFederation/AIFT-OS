name: Sync Verified Preflight To Main

on:
  workflow_run:
    workflows:
      - Capital City Provisions CI
    branches:
      - preflight
    types:
      - completed

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Sync main to verified preflight commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.workflow_run.head_sha;
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: 'heads/main',
              sha,
              force: false,
            });
            core.notice(`main synced to verified preflight commit ${sha}`);
